name: CI

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    validate:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: inventory-system

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: inventory-system/package-lock.json

            - name: Install Dependencies
              run: npm ci --no-audit --no-fund

            - name: Lint Project
              run: npm run lint

            - name: Build Project
              run: npm run build
