name: Build and Deploy to Firebase

# Trigger the workflow on pushes and pull requests to the main branch
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest

        steps:
            - name: 🛎️ Checkout Repository
              uses: actions/checkout@v4

            - name: ⚙️ Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20" # Match this to your local development environment
                  cache: "npm"

            - name: 📦 Install Dependencies
              run: npm ci

            # Optional but recommended: Run linter if you have one configured
            # - name: 🔍 Lint Code
            #   run: npm run lint

            - name: 🏗️ Build Project
              run: npm run build
              env:
                  # If you have environment variables (like Vite API keys), pass them here
                  VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

            - name: 🚀 Deploy to Firebase Hosting (Preview on PR)
              if: github.event_name == 'pull_request'
              uses: FirebaseExtended/action-hosting-deploy@v0
              with:
                  repoToken: "${{ secrets.GITHUB_TOKEN }}"
                  firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" # Or use FIREBASE_TOKEN below
                  projectId: "your-firebase-project-id" # ⚠️ REPLACE WITH YOUR PROJECT ID
              env:
                  FIREBASE_CLI_EXPERIMENTS: webframeworks

            - name: 🚀 Deploy to Firebase Hosting (Production)
              if: github.event_name == 'push'
              uses: w9jds/firebase-action@master
              with:
                  args: deploy --only hosting
              env:
                  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
